<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="grid">
    <div id="tooltip" class="tooltip"></div>
    <div class="app">

    <header class="header">
        <h1>Generative Plants</h1>
        <p>Grow your own procedural trees with L-systems. Have fun!</p>
    </header>

    <div class="workspace">

        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>

        <div id="settings">

            <div class="settings-section">
                <div class="section-title">Examples</div>

                <select id="globalPresets" onchange="OnGlobalPresetChanged()">
                    <option value="0">Bush</option>
                    <option value="1">Sunset</option>
                    <option value="2" selected="selected">Blossom</option>
                    <option value="3">Reed</option>
                    <option value="4">Tree</option>
                    <option value="5">Pine</option>
                    <option value="6">Mushroom</option>
                    <option value="7">Grass</option>
                    <option value="8">Squares</option>
                </select>

                <div class="preset-grid" id="presetGrid">
                    <button class="preset" data-value="0">Bush</button>
                    <button class="preset" data-value="1">Sunset</button>
                    <button class="preset active" data-value="2">Blossom</button>
                    <button class="preset" data-value="3">Reed</button>
                    <button class="preset" data-value="4">Tree</button>
                    <button class="preset" data-value="5">Pine</button>
                    <button class="preset" data-value="6">Mushroom</button>
                    <button class="preset" data-value="7">Grass</button>
                    <button class="preset" data-value="8">Squares</button>
                </div>

                <input type="button" value="Randomize Values" id="randomimze" onclick="OnRandomize()">
            </div>

            <div class="settings-section">
                <div class="section-title">Scene</div>

                <label data-tooltip="Color of the sky at the top of the scene.">Background Top</label>
                <input type="color" id="background-col-top" value="#ddfafd" oninput="OnParamsChanged()">

                <label data-tooltip="Color of the sky near the ground.">Background Bottom</label>
                <input type="color" id="background-col-bottom" value="#fecba9" oninput="OnParamsChanged()">
            </div>

            <div class="settings-section">
                <div class="section-title">Growth</div>

                <label data-tooltip="Selects a predefined growth style that defines how the plant structure evolves.">Growth Pattern</label>
                <input type="range" id="presets" min="0" max="10" value="1" oninput="OnParamsChanged()">
                    <button data-value="6" class="preset">Leaning Right</button>
                    <button data-value="7" class="preset">Lollipop</button>
                    <button data-value="8" class="preset">Flower Leaves</button>
                    <button data-value="9" class="preset">Dense Shrub</button>
                    <button data-value="10" class="preset">Sapling</button>
                </div>

                <!-- hidden compatibility input -->
                <input type="hidden" id="presets" value="1">

                <label data-tooltip="How many times the structure is expanded. Higher values create more complex and detailed plants.">Iterations</label>
                <input type="range" id="iterations" min="1" max="5" value="3" oninput="OnParamsChanged()">

                <label data-tooltip="Controls randomness in branching angle and length, based on the seed. Low values produce stable, predictable shapes. High values create wild organic growth.">Variability</label>
                <input type="range" id="variability" min="0.0" max="1.0" value="0.1" step="0.01" oninput="OnParamsChanged()">

                <label data-tooltip="Determines the variability of the generated plant. Same seed always produces the same result.">Seed</label>
                <input type="range" id="seed" min="0" max="50" value="25" oninput="OnParamsChanged()">

                <label data-tooltip="Animates the generation process step by step.">
                    <input type="checkbox" id="animate" oninput="OnParamsChanged()">
                    Animate
                </label>
            </div>

            <div class="settings-section">
                <div class="section-title">Leaves</div>

                <label data-tooltip="Color of the leaves at the tips of the plant.">Color</label>
                <input type="color" id="leaves-col" value="#5edb3b" oninput="OnParamsChanged()">

                <label data-tooltip="Controls the shape style of leaves.">Shape</label>
                <div class="preset-grid" id="leafShapeGrid">
                    <button data-value="0" class="preset">Pointy</button>
                    <button data-value="1" class="preset">Round</button>
                    <button data-value="2" class="preset">Hexagon</button>
                </div>

                <!-- hidden compatibility input -->
                <input type="hidden" id="leaves-type" value="0">

                <label data-tooltip="Transparency of leaves.">Transparency</label>
                <input type="range" id="leaves-alpha" min="0.1" max="1.0" value="0.75" step="0.01" oninput="OnParamsChanged()">

                <label data-tooltip="Size of individual leaves along their main axis.">Length</label>
                <input type="range" id="leaves-length" min="0.5" max="20" value="10.0" oninput="OnParamsChanged()">

                <label data-tooltip="Thickness of leaves perpendicular to their growth direction.">Width</label>
                <input type="range" id="leaves-width" min="0.5" max="20" value="5.0" oninput="OnParamsChanged()">
            </div>

            <div class="settings-section">
                <div class="section-title">Branches</div>

                <label data-tooltip="Color of the branches.">Color</label>
                <input type="color" id="branches-col" value="#7d5010" oninput="OnParamsChanged()">

                <label data-tooltip="Length of the initial branch segment before it continues or splits.">Length</label>
                <input type="range" id="branches-length" min="0.5" max="100" value="30.0" oninput="OnParamsChanged()">

                <label data-tooltip="Angle between branches. Small angles create dense upward growth, large angles create spread-out shapes.">Angle</label>
                <input type="range" id="branches-angle" min="0.1" max="90.0" value="22.5" step="0.1" oninput="OnParamsChanged()">

                <label data-tooltip="Initial thickness of the trunk and main branches.">Width</label>
                <input type="range" id="branches-width" min="0.1" max="45.0" value="6.0" step="0.1" oninput="OnParamsChanged()">

                <label data-tooltip="How quickly branches thin as they grow.">Width Falloff</label>
                <input type="range" id="branches-width-falloff" min="0.1" max="1.0" value="0.7" step="0.01" oninput="OnParamsChanged()">

                <label data-tooltip="Minimum thickness a branch can reach.">Min Width</label>
                <input type="range" id="branches-min-width" min="0.1" max="10.0" value="0.3" step="0.1" oninput="OnParamsChanged()">
            </div>

            <div class="settings-section">
                <div class="section-title">Raw System</div>
                <textarea id="sentence" oninput="OnSentenceChanged()"></textarea>
            </div>

        </div>

    </div>

</div>
    <script src="src/random.js"></script>
    <script src="src/generation.js"></script>
</body>

</html>
